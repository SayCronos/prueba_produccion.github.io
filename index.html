            text-align: center;
            position: relative;
        }

            left: 0;
            right: 0;
            bottom: 0;

            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);

        }

        }
        
        label {

            font-size: 1rem;
            font-family: inherit;
            background: white;
            transition: all 0.2s;
        }

            outline: none;
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }
        
        select {
            cursor: pointer;
            background: white;
        }
        
        .autocomplete-container {
            position: relative;
        }
        
        .autocomplete-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 2px solid #10b981;
            border-top: none;
            border-radius: 0 0 0.5rem 0.5rem;
            max-height: 250px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.2);
        }
        
        .autocomplete-list.show {
            display: block;
        }
        
        .autocomplete-item {
            padding: 0.75rem 1rem;
            cursor: pointer;
            border-bottom: 1px solid #d1fae5;
            transition: background 0.2s;
        }
        
        .autocomplete-item:hover {
            background: #ecfdf5;
        }
        
        .autocomplete-item:last-child {
            border-bottom: none;
        }
        
        .autocomplete-code {
            font-weight: 700;
            color: #047857;
        }
        
        .autocomplete-name {
            font-size: 0.875rem;
            color: #059669;
            margin-top: 0.25rem;
        }
        
        .btn {
            padding: 0.875rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        
        .btn:hover::before {
            left: 100%;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #047857 0%, #065f46 100%);
            color: white;
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }
        
        .record-form {

            margin-bottom: 1.5rem;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.1);
        }

            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            padding: 0.75rem;
            background: #f0fdf4;
            border-radius: 0.5rem;
            border: 2px solid #bbf7d0;
        }
        
        .select-group label {
            font-weight: 600;

        }

            font-weight: 600;
            background: white;
            color: #065f46;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.05em;

        .yesno-select:focus {
            outline: none;
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .record-card {
            background: white;
            border: 2px solid #d1fae5;
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-bottom: 1rem;
            transition: all 0.2s;
            box-shadow: 0 2px 10px rgba(16, 185, 129, 0.1);

            padding-bottom: 0.75rem;
            border-bottom: 2px solid #bbf7d0;

            color: #047857;
            font-size: 1.125rem;
            font-weight: 700;
        }
        
        .record-details {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1rem;
        }

            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        
        .detail-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #059669;
            font-weight: 600;
        }
        
        .detail-value {
            font-size: 0.95rem;
            color: #065f46;
            font-weight: 500;
        }
        
        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        
        .badge-success {
            background: #dcfce7;
            color: #047857;
            border: 1px solid #bbf7d0;
        }
        
        .badge-danger {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #6b7280;
        }
        
        .actions-bar {
            position: sticky;
            bottom: 0;
            background: white;
            padding: 1rem 2rem;
            border-top: 3px solid #10b981;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            box-shadow: 0 -4px 15px rgba(16, 185, 129, 0.1);
        }
        
        .toast {
            position: fixed;
            top: 2rem;
            right: 2rem;

            color: white;
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;

            z-index: 9999;
        }

                    <div class="form-group">

                    <div class="form-group">

                    </div>

                    </div>

        };
        
        // Lista de máquinas
        const maquinas = ["1000A", "1000B", "1000C", "1000D", "100A", "1080A", "1080B", "1100A", "1100B", "110A", "1200A", "1500A", "1600A", "1600B", "160A", "165A", "165B", "165C", "165D", "1750A", "180A", "190A", "200A", "200C", "200D", "200E", "200F", "2100A", "220A", "240A", "250A", "250B", "250C", "280A", "280B", "280C", "280D", "280E", "280F", "280G", "280H", "280I", "3000A", "300B", "350A", "350B", "350C", "350D", "350E", "350F", "350G", "350H", "350I", "35A", "360A", "360B", "375A", "375B", "375C", "380A", "380B", "380C", "380D", "380E", "380F", "390A", "4000A", "400A", "40A", "440A", "450A", "450B", "470A", "470B", "470C", "480A", "480B", "500C", "500D", "50A", "530A", "60A", "60B", "650A", "650B", "65A", "700A", "71A", "730A", "75A", "76A", "76B", "7A", "7B", "800A", "80A", "840A", "85A", "85B", "85C", "880A", "880B", "900A", "950A", "950B"];
        
        let registros = [];
        let currentFocus = -1;
        
        window.addEventListener('DOMContentLoaded', () => {
            cargarMaquinas();
            document.getElementById('fecha').valueAsDate = new Date();
            cargarRegistrosGuardados();
            setupAutocomplete();
        });
        
        function cargarMaquinas() {
            const select = document.getElementById('maquina');
            maquinas.forEach(m => {
                const option = document.createElement('option');
                option.value = m;
                option.textContent = m;
                select.appendChild(option);
            });
        }
        
        function setupAutocomplete() {
            const input = document.getElementById('codigoProducto');
            const list = document.getElementById('autocompleteList');
            
            input.addEventListener('input', function() {
                const val = this.value.toUpperCase().trim();
                list.innerHTML = '';
                currentFocus = -1;
                
                if (!val) {
                    list.classList.remove('show');
                    return;
                }
                
                const matches = Object.keys(productosDB)
                    .filter(code => code.includes(val))
                    .slice(0, 10);
                
                if (matches.length === 0) {
                    list.classList.remove('show');
                    return;
                }
                
                matches.forEach(code => {
                    const item = document.createElement('div');
                    item.className = 'autocomplete-item';
                    item.innerHTML = `
                        <div class="autocomplete-code">${code}</div>
                        <div class="autocomplete-name">${productosDB[code].nombre}</div>
                    `;
                    item.addEventListener('click', () => selectProduct(code));
                    list.appendChild(item);
                });
                
                list.classList.add('show');
            });
            
            input.addEventListener('keydown', function(e) {
                const items = list.getElementsByClassName('autocomplete-item');
                if (e.keyCode === 40) {
                    currentFocus++;
                    addActive(items);
                } else if (e.keyCode === 38) {
                    currentFocus--;
                    addActive(items);
                } else if (e.keyCode === 13) {
                    e.preventDefault();
                    if (currentFocus > -1 && items[currentFocus]) {
                        items[currentFocus].click();
                    }
                }
            });
            
            document.addEventListener('click', function(e) {
                if (e.target !== input) {
                    list.classList.remove('show');
                }
            });
        }
        
        function addActive(items) {
            if (!items || items.length === 0) return;
            removeActive(items);
            if (currentFocus >= items.length) currentFocus = 0;
            if (currentFocus < 0) currentFocus = items.length - 1;
            items[currentFocus].classList.add('autocomplete-active');
        }
        
        function removeActive(items) {
            for (let item of items) {
                item.classList.remove('autocomplete-active');
            }
        }
        
        function selectProduct(code) {
            const producto = productosDB[code];
            document.getElementById('codigoProducto').value = code;
            document.getElementById('codigoPieza').value = producto.nombre;
            document.getElementById('pesoNetoTeorico').value = producto.pesoNeto;
            document.getElementById('pesoBrutoTeorico').value = producto.pesoBruto;
            document.getElementById('cicloFicha').value = producto.ciclo;
            document.getElementById('autocompleteList').classList.remove('show');
            mostrarToast('✅ Producto autocargado');
        }
        
        function agregarRegistro() {
            const fecha = document.getElementById('fecha').value;
            const turno = document.getElementById('turno').value;
            const lider = document.getElementById('lider').value;
            const maquina = document.getElementById('maquina').value;
            const codigoProducto = document.getElementById('codigoProducto').value;
            const ordenProduccion = document.getElementById('ordenProduccion').value;
            const codigoPieza = document.getElementById('codigoPieza').value;
            const operarios = document.getElementById('operarios').value;
            
            if (!fecha || !turno || !lider) {
                mostrarToast('❌ Completa Fecha, Turno y Líder');
                return;
            }
            
            if (!maquina || !codigoProducto || !codigoPieza || !operarios) {
                mostrarToast('❌ Completa los campos obligatorios');
                return;
            }
            
            const registro = {
                id: Date.now(),
                maquina: maquina,
                codigoProducto: codigoProducto,
                ordenProduccion: ordenProduccion || '',
                codigoPieza: codigoPieza,
                pesoBrutoTeorico: document.getElementById('pesoBrutoTeorico').value || '',
                pesoBrutoReal: document.getElementById('pesoBrutoReal').value || '',
                pesoNetoTeorico: document.getElementById('pesoNetoTeorico').value || '',
                pesoNetoReal: document.getElementById('pesoNetoReal').value || '',
                cicloFicha: document.getElementById('cicloFicha').value || '',
                cicloReal: document.getElementById('cicloReal').value || '',
                operarios: operarios,
                instructivo: document.getElementById('instructivo').value,
                mattec: document.getElementById('mattec').value,
                alerta: document.getElementById('alerta').value,
                cavidades: document.getElementById('cavidades').value,
                observaciones: document.getElementById('observaciones').value
            };
            
            registros.push(registro);
            guardarLocal();
            renderizar();
            limpiarFormulario();
            mostrarToast('✅ Registro agregado');
        }
        
        function renderizar() {
            const lista = document.getElementById('recordsList');
            const contador = document.getElementById('recordCount');
            
            contador.textContent = `📝 ${registros.length} registro${registros.length !== 1 ? 's' : ''}`;
            
            if (registros.length === 0) {
                lista.innerHTML = '<div class="empty-state"><h3>No hay registros</h3><p>Completa el formulario para agregar registros</p></div>';
                return;
            }
            
            lista.innerHTML = registros.map(r => `
                <div class="record-card">
                    <div class="record-card-header">
                        <h3>🔧 ${r.maquina} - ${r.codigoProducto}</h3>
                        <button class="btn btn-danger" onclick="eliminar(${r.id})" style="padding: 0.5rem 1rem;">🗑️</button>
                    </div>
                    <div class="record-details">
                        <div class="detail-item">
                            <span class="detail-label">Código Producto</span>
                            <span class="detail-value">${r.codigoProducto}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Nombre Pieza</span>
                            <span class="detail-value">${r.codigoPieza}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Orden</span>
                            <span class="detail-value">${r.ordenProduccion || '-'}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Peso Bruto</span>
                            <span class="detail-value">T: ${r.pesoBrutoTeorico || '-'} / R: ${r.pesoBrutoReal || '-'}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Peso Neto</span>
                            <span class="detail-value">T: ${r.pesoNetoTeorico || '-'} / R: ${r.pesoNetoReal || '-'}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Ciclo</span>
                            <span class="detail-value">F: ${r.cicloFicha || '-'} / R: ${r.cicloReal || '-'}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Operarios</span>
                            <span class="detail-value">${r.operarios}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Instructivo</span>
                            <span class="detail-value">${r.instructivo === 'SÍ' ? '<span class="badge badge-success">SÍ</span>' : '<span class="badge badge-danger">NO</span>'}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Mattec</span>
                            <span class="detail-value">${r.mattec === 'SÍ' ? '<span class="badge badge-success">SÍ</span>' : '<span class="badge badge-danger">NO</span>'}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Alerta</span>
                            <span class="detail-value">${r.alerta === 'SÍ' ? '<span class="badge badge-danger">SÍ</span>' : '<span class="badge badge-success">NO</span>'}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Cavidades</span>
                            <span class="detail-value">${r.cavidades === 'SÍ' ? '<span class="badge badge-success">SÍ</span>' : '<span class="badge badge-danger">NO</span>'}</span>
                        </div>
                        ${r.observaciones ? `<div class="detail-item" style="grid-column: 1 / -1;"><span class="detail-label">Observaciones</span><span class="detail-value">${r.observaciones}</span></div>` : ''}
                    </div>
                </div>
            `).join('');
        }
        
        function eliminar(id) {
            if (confirm('¿Eliminar este registro?')) {
                registros = registros.filter(r => r.id !== id);
                guardarLocal();
                renderizar();
                mostrarToast('✅ Registro eliminado');
            }
        }
        
        function limpiarFormulario() {
            document.getElementById('maquina').value = '';
            document.getElementById('codigoProducto').value = '';
            document.getElementById('ordenProduccion').value = '';
            document.getElementById('codigoPieza').value = '';
            document.getElementById('pesoBrutoTeorico').value = '';
            document.getElementById('pesoBrutoReal').value = '';
            document.getElementById('pesoNetoTeorico').value = '';
            document.getElementById('pesoNetoReal').value = '';
            document.getElementById('cicloFicha').value = '';
            document.getElementById('cicloReal').value = '';
            document.getElementById('operarios').value = '';
            document.getElementById('instructivo').value = 'NO';
            document.getElementById('mattec').value = 'NO';
            document.getElementById('alerta').value = 'NO';
            document.getElementById('cavidades').value = 'NO';
            document.getElementById('observaciones').value = '';
        }
        
        function limpiarTodo() {
            if (confirm('¿Eliminar TODOS los registros?')) {
                registros = [];
                guardarLocal();
                renderizar();
                mostrarToast('✅ Todo eliminado');
            }
        }
        
        function descargarExcel() {
            const fecha = document.getElementById('fecha').value;
            const turno = document.getElementById('turno').value;
            const lider = document.getElementById('lider').value;
            
            if (registros.length === 0) {
                mostrarToast('❌ No hay registros para descargar');
                return;
            }
            
            // Crear datos para Excel
            const datosExcel = [
                [`RECOLECCIÓN DE DATOS - RONDA EN PLANTA EQUIPOS AUTÓNOMOS (MANIZALES)`],
                [``],
                [`FECHA: ${fecha}`, `TURNO: ${turno}`, `LÍDER: ${lider}`],
                [``],
                [
                    'MÁQUINA', 'CÓDIGO PRODUCTO', 'ORDEN PRODUCCIÓN', 'NOMBRE PIEZA',
                    'PESO BRUTO TEÓRICO', 'PESO BRUTO REAL', 'PESO NETO TEÓRICO', 'PESO NETO REAL',
                    'CICLO FICHA', 'CICLO REAL', 'OPERARIOS', 'INSTRUCTIVO', 'MATTEC', 'ALERTA', 'CAVIDADES', 'OBSERVACIONES'
                ]
            ];
            
            // Agregar registros
            registros.forEach(r => {
                datosExcel.push([
                    r.maquina || '',
                    r.codigoProducto || '',
                    r.ordenProduccion || '',
                    r.codigoPieza || '',
                    r.pesoBrutoTeorico || '',
                    r.pesoBrutoReal || '',
                    r.pesoNetoTeorico || '',
                    r.pesoNetoReal || '',
                    r.cicloFicha || '',
                    r.cicloReal || '',
                    r.operarios || '',
                    r.instructivo || '',
                    r.mattec || '',
                    r.alerta || '',
                    r.cavidades || '',
                    r.observaciones || ''
                ]);
            });
            
            // Crear workbook y worksheet
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(datosExcel);
            
            // Autoajustar columnas
            const colWidths = [
                {wch: 12}, {wch: 15}, {wch: 18}, {wch: 30},
                {wch: 18}, {wch: 18}, {wch: 18}, {wch: 18},
                {wch: 12}, {wch: 12}, {wch: 20}, {wch: 12},
                {wch: 12}, {wch: 12}, {wch: 12}, {wch: 25}
            ];
            ws['!cols'] = colWidths;
            
            // Estilos para encabezados
            const headerRange = XLSX.utils.decode_range(ws['!ref']);
            for (let C = headerRange.s.c; C <= 4; ++C) {
                const address = XLSX.utils.encode_cell({r: 4, c: C});
                if (!ws[address]) continue;
                ws[address].s = {
                    font: { bold: true, color: { rgb: "FFFFFF" }, sz: 12 },
                    fill: { fgColor: { rgb: "047857" } },
                    alignment: { horizontal: "center", vertical: "center" }
                };
            }
            
            XLSX.utils.book_append_sheet(wb, ws, "Registros");
            XLSX.writeFile(wb, `Ronda_Planta_${fecha}_${turno}.xlsx`);
            
            mostrarToast('✅ 📊 Excel descargado correctamente');
        }
        
        function guardarLocal() {
            localStorage.setItem('registrosRonda', JSON.stringify(registros));
        }
        
        function cargarRegistrosGuardados() {
            const guardados = localStorage.getItem('registrosRonda');
            if (guardados) {
                registros = JSON.parse(guardados);
                renderizar();
            }
        }
        
        function mostrarToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
